# ══════════════════════════════════════════════════════════════════════════════
#  nginx — TLS termination proxy for Voice Agent Platform
#
#  Handles:
#    wss://yourdomain.com/ws          → ws://127.0.0.1:8080   (WebSocket gateway)
#    https://yourdomain.com/widget/   → http://127.0.0.1:8081  (static files)
#    https://yourdomain.com/api/      → http://127.0.0.1:5001  (REST API)
#    https://yourdomain.com/admin/    → http://127.0.0.1:5001  (REST admin)
#    https://yourdomain.com/health    → http://127.0.0.1:5001  (health check)
#
#  Setup:
#    1. Replace every occurrence of "yourdomain.com" with your real domain.
#    2. Copy to /etc/nginx/sites-available/voiceagent
#    3. sudo ln -s /etc/nginx/sites-available/voiceagent /etc/nginx/sites-enabled/
#    4. Run certbot (see setup.sh) — it will fill in the ssl_certificate paths.
#    5. sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream definitions ──────────────────────────────────────────────────────

upstream ws_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream static_server {
    server 127.0.0.1:8081;
    keepalive 16;
}

upstream rest_api {
    server 127.0.0.1:5001;
    keepalive 16;
}


# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Allow Certbot ACME challenge (auto-filled by certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── Main HTTPS server ─────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com;

    # ── TLS certificates (filled in by certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-XSS-Protection          "1; mode=block"                        always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 20m;   # PDF uploads (Qdrant upload route)


    # ── /ws — WebSocket voice pipeline ───────────────────────────────────────
    location /ws {
        proxy_pass         http://ws_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade handshake
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Forward real client info
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin     $http_origin;

        # Voice sessions can be long — set generous timeouts
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering — audio chunks must flow immediately
        proxy_buffering    off;
        proxy_cache        off;
    }


    # ── /widget/ — Static files (chat-widget.js, VAD assets) ─────────────────
    location /widget/ {
        proxy_pass         http://static_server/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ONNX model is ~2MB — allow time to download
        proxy_read_timeout  30s;

        # Cache static assets aggressively (widget.js has no-cache set by Python)
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }


    # ── /api/ — REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://rest_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;

        # Pass API key header through
        proxy_pass_header  X-API-Key;
        proxy_pass_header  Authorization;
    }


    # ── /admin/ — Admin routes (document upload etc.) ─────────────────────────
    location /admin/ {
        proxy_pass         http://rest_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # PDF uploads can be large and slow
        proxy_read_timeout  120s;
        proxy_pass_header  X-API-Key;
        proxy_pass_header  Authorization;
    }


    # ── /health — Health check ────────────────────────────────────────────────
    location /health {
        proxy_pass         http://rest_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;  # don't flood logs with health pings
    }
}
