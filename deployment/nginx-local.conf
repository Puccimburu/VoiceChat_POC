# ══════════════════════════════════════════════════════════════════════════════
#  nginx — LOCAL DEV config for WSS testing (Windows)
#
#  Ports (no admin needed — not 443):
#    wss://localhost:8443/ws          → ws://127.0.0.1:8080   (WebSocket)
#    https://localhost:8444/widget/   → http://127.0.0.1:8081  (static)
#    https://localhost:8444/api/      → http://127.0.0.1:5001  (REST)
#    https://localhost:8444/admin/    → http://127.0.0.1:5001  (REST)
#    https://localhost:8444/health    → http://127.0.0.1:5001  (health)
#
#  Test command:
#    python tests/test_system.py --ws wss://localhost:8443/ws --api https://localhost:8444
# ══════════════════════════════════════════════════════════════════════════════

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # ── Upstream definitions ──────────────────────────────────────────────────

    upstream ws_gateway {
        server 127.0.0.1:8080;
    }

    upstream static_server {
        server 127.0.0.1:8081;
    }

    upstream rest_api {
        server 127.0.0.1:5001;
    }


    # ── WSS server (port 8443) ────────────────────────────────────────────────

    server {
        listen 8443 ssl;
        server_name localhost;

        # ── Certs generated by mkcert ─────────────────────────────────────────
        # UPDATE THESE PATHS to where you saved your certs
        ssl_certificate     C:/Users/Pucci/Desktop/certs/localhost+1.pem;
        ssl_certificate_key C:/Users/Pucci/Desktop/certs/localhost+1-key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        # ── /ws → WebSocket gateway ───────────────────────────────────────────
        location /ws {
            proxy_pass         http://ws_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   Origin     $http_origin;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_buffering     off;
        }
    }


    # ── HTTPS server (port 8444) — REST + static ──────────────────────────────

    server {
        listen 8444 ssl;
        server_name localhost;

        ssl_certificate     C:/Users/Pucci/Desktop/certs/localhost+1.pem;
        ssl_certificate_key C:/Users/Pucci/Desktop/certs/localhost+1-key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        client_max_body_size 20m;

        location /widget/ {
            proxy_pass         http://static_server/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /api/ {
            proxy_pass         http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_pass_header  X-API-Key;
            proxy_pass_header  Authorization;
            proxy_read_timeout 60s;
        }

        location /admin/ {
            proxy_pass         http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_pass_header  X-API-Key;
            proxy_pass_header  Authorization;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass         http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── /demo/ — serve local HTML test pages ─────────────────────────────
        location /demo/ {
            alias C:/Users/Pucci/Desktop/POC/deployment/static/;
            index index.html;
        }

        location / {
            proxy_pass         http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
